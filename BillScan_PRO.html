<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Scan PRO</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Bill Scan PRO</h1>
    </header>
    <main>
        <section>
            <h2>Scan Your Bill</h2>
            <form id="scan-form">
                <input type="file" id="file-input" accept="image/*">
                <button type="submit">Scan</button>
            </form>
        </section>
        <section id="results">
            <h2>Scan Results</h2>
            <div id="output"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Bill Scan PRO. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
